<!DOCTYPE html>
<html>
<head>
<title>SecureChatHQ</title>

<link rel="icon" href="favicon.png">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* LOGIN SCREENS */

.screen{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
}

.box{
background:#020617;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
margin-top:12px;
padding:10px;
width:100%;
border:none;
background:#38bdf8;
border-radius:6px;
cursor:pointer;
}

#error{
color:red;
margin-top:10px;
}

/* APP */

#app{
display:none;
height:100vh;
display:flex;
}

/* SIDEBAR */

#sidebar{
width:220px;
background:#020617;
padding:15px;
border-right:1px solid #1e293b;
}

/* CHAT */

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
max-width:65%;
padding:10px 14px;
border-radius:14px;
}

.self{
align-self:flex-end;
background:#2563eb;
}

.other{
align-self:flex-start;
background:#1e293b;
}

.username{
font-size:11px;
opacity:.6;
margin-bottom:3px;
}

#messageForm{
display:flex;
padding:10px;
background:#020617;
}

#messageInput{
flex:1;
padding:10px;
border:none;
border-radius:6px;
margin-right:8px;
}

</style>
</head>

<body>

<!-- PASSWORD SCREEN -->

<div id="passwordScreen" class="screen">
<div class="box">
<h2>SecureChatHQ</h2>
<input id="passwordInput" type="password" placeholder="Enter password">
<button onclick="checkPassword()">Continue</button>
<div id="error"></div>
</div>
</div>

<!-- USERNAME SCREEN -->

<div id="usernameScreen" class="screen" style="display:none;">
<div class="box">
<h2>Choose Username</h2>
<input id="usernameInput" placeholder="Username">
<button onclick="setUsername()">Join Chat</button>
</div>
</div>

<!-- CHAT APP -->

<div id="app">

<div id="sidebar">
<h3>Online</h3>
<div id="users"></div>
</div>

<div id="main">

<div id="chat"></div>

<form id="messageForm">
<input id="messageInput" placeholder="Type message...">
<button>Send</button>
</form>

</div>

</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>

const socket = io("https://chat-hq.onrender.com");

let username="";
let isAdmin=false;

/* PASSWORD STEP */

function checkPassword(){

const pw=document.getElementById("passwordInput").value;

socket.emit("enter password",pw,(res)=>{

if(!res.success){
document.getElementById("error").textContent="Wrong password";
return;
}

isAdmin=res.isAdmin;

document.getElementById("passwordScreen").style.display="none";
document.getElementById("usernameScreen").style.display="flex";

});

}

/* USERNAME STEP */

function setUsername(){

username=document.getElementById("usernameInput").value;

if(!username) return;

socket.emit("set username",username,(res)=>{

if(!res.success){
alert(res.message);
return;
}

document.getElementById("usernameScreen").style.display="none";
document.getElementById("app").style.display="flex";

});

}

/* SEND MESSAGE */

document.getElementById("messageForm").addEventListener("submit",e=>{

e.preventDefault();

const input=document.getElementById("messageInput");

if(input.value){

socket.emit("chat message",input.value);
input.value="";

}

});

/* DISPLAY MESSAGE */

socket.on("chat message",data=>{

const chat=document.getElementById("chat");

const bubble=document.createElement("div");

bubble.classList.add("message");

if(data.username===username){
bubble.classList.add("self");
}else{
bubble.classList.add("other");
}

const user=document.createElement("div");
user.className="username";
user.textContent=data.username;

const text=document.createElement("div");
text.textContent=data.message;

bubble.appendChild(user);
bubble.appendChild(text);

chat.appendChild(bubble);

chat.scrollTop=chat.scrollHeight;

});

/* ONLINE USERS */

socket.on("online users",users=>{
document.getElementById("users").textContent=users.join(", ");
});

</script>

</body>
</html>
