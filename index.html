<!DOCTYPE html>
<html>
<head>

<title>SecureChatHQ</title>
<link rel="icon" href="favicon.png">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

/* LOGIN SCREENS */

.screen{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
}

.loginBox{
background:#020617;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,.5);
}

.loginBox h2{
margin-top:0;
color:#38bdf8;
}

.loginBox input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
}

.loginBox button{
margin-top:12px;
width:100%;
padding:12px;
border:none;
background:#38bdf8;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

#error{
color:red;
margin-top:10px;
}

/* APP */

#app{
display:none;
height:100vh;
}

/* MAIN CHAT CONTAINER */

#main{
display:flex;
flex-direction:column;
height:100vh;
max-width:900px;
margin:auto;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

/* CHAT BUBBLES */

.message{
max-width:65%;
padding:10px 14px;
border-radius:16px;
font-size:14px;
word-wrap:break-word;
}

.self{
align-self:flex-end;
background:#2563eb;
border-bottom-right-radius:4px;
}

.other{
align-self:flex-start;
background:#1e293b;
border-bottom-left-radius:4px;
}

.username{
font-size:11px;
opacity:.6;
margin-bottom:4px;
}

/* MESSAGE BAR */

#messageForm{
display: flex;
align-items: center;
padding: 10px;
gap: 8px;
background: #0f172a;
border-top: 1px solid #1e293b;
}

#messageInput{
flex: 1;
padding: 8px 10px;
font-size: 14px;
border-radius: 8px;
border: none;
outline: none;
}

#sendBtn{
padding: 8px 14px;
border: none;
border-radius: 8px;
background: #38bdf8;
color: white;
font-size: 14px;
font-weight: 500;
cursor: pointer;
width: auto;
min-width: 70px;
height: 36px;
}

</style>
</head>

<body>

<!-- PASSWORD SCREEN -->

<div id="passwordScreen" class="screen">

<div class="loginBox">

<h2>SecureChatHQ</h2>

<input id="passwordInput" type="password" placeholder="Enter password">

<button onclick="checkPassword()">Continue</button>

<div id="error"></div>

</div>

</div>

<!-- USERNAME SCREEN -->

<div id="usernameScreen" class="screen" style="display:none;">

<div class="loginBox">

<h2>Choose Username</h2>

<input id="usernameInput" placeholder="Username">

<button onclick="setUsername()">Join Chat</button>

</div>

</div>

<!-- CHAT APP -->

<div id="app">

<div id="sidebar">
<h3>Online</h3>
<div id="users">Loading...</div>
</div>

<div id="main">

<div id="chat"></div>

<form id="messageForm">

<input id="messageInput" autocomplete="off" placeholder="Type a message...">

<button id="sendBtn">Send</button>

</form>

</div>

</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>

const socket = io("https://chat-hq.onrender.com");

let username="";
let isAdmin=false;

/* PASSWORD CHECK */

function checkPassword(){

const pw=document.getElementById("passwordInput").value;

socket.emit("enter password",pw,(res)=>{

if(!res.success){
document.getElementById("error").textContent="Wrong password";
return;
}

isAdmin=res.isAdmin;

document.getElementById("passwordScreen").style.display="none";
document.getElementById("usernameScreen").style.display="flex";

});

}

/* USERNAME SET */

function setUsername(){

username=document.getElementById("usernameInput").value;

if(!username) return;

socket.emit("set username",username,(res)=>{

if(!res.success){
alert(res.message);
return;
}

document.getElementById("usernameScreen").style.display="none";
document.getElementById("app").style.display="block";

});

}

socket.on("user list", function(users){

const list = document.getElementById("users");

list.innerHTML = "";

users.forEach(user => {

const div = document.createElement("div");
div.textContent = user;

list.appendChild(div);

});

});
  
/* SEND MESSAGE */

document.getElementById("messageForm").addEventListener("submit",function(e){

e.preventDefault();

const input=document.getElementById("messageInput");

if(input.value){

socket.emit("chat message",input.value);

input.value="";

}

});

/* RECEIVE MESSAGE */

socket.on("chat message",function(data){

const chat=document.getElementById("chat");

const bubble=document.createElement("div");

bubble.classList.add("message");

if(data.username===username){
bubble.classList.add("self");
}else{
bubble.classList.add("other");
}

const user=document.createElement("div");
user.className="username";
user.textContent=data.username;

const text=document.createElement("div");
text.textContent=data.message;

bubble.appendChild(user);
bubble.appendChild(text);

chat.appendChild(bubble);

chat.scrollTop=chat.scrollHeight;

});

</script>

</body>
</html>
